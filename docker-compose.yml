services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: topcard
      POSTGRES_PASSWORD: topcard
      POSTGRES_DB: topcard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U topcard']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3333:3333'
      - '5173:5173'
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333
      APP_URL: http://localhost:3333
      LOG_LEVEL: info
      SESSION_DRIVER: cookie
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: topcard
      DB_PASSWORD: topcard
      DB_DATABASE: topcard
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node ace migration:run --compact-output && node ace db:seed && npm run dev"

volumes:
  postgres_data:
